version: "3.9"

services:
  # ── PostgreSQL database ──────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: roadguard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: roadguard
      POSTGRES_USER: roadguard
      POSTGRES_PASSWORD: roadguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U roadguard" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: roadguard_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://roadguard:roadguard@postgres:5432/roadguard
      EVIDENCE_DIR: /app/evidence
    volumes:
      - evidence_data:/app/evidence
    ports:
      - "8000:8000"
    # ── GPU passthrough (requires nvidia-container-toolkit) ──
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Video processor ──────────────────────────────────────────────────────
  processor:
    build:
      context: .
      dockerfile: processor/Dockerfile
    container_name: roadguard_processor
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
      EVIDENCE_DIR: /app/evidence
    volumes:
      - evidence_data:/app/evidence
      - ./config:/app/config:ro # mount config directory read-only
      - ./models:/app/models:ro # mount trained models read-only
    # ── GPU passthrough (requires nvidia-container-toolkit) ──
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Pass through video device for webcam (Linux). Remove on Windows.
    # devices:
    #   - /dev/video0:/dev/video0

volumes:
  postgres_data:
  evidence_data:
